name: Deploy to Azure Container Registry

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ai-shopping-assistant

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}
      
      - name: Build and push Docker image
        working-directory: ./src
        run: |
          # Build the image with the ENV secret as a build argument
          docker build \
            --build-arg ENV_CONTENT="${{ secrets.ENV }}" \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .
          
          # Push both tags to ACR
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
      
      - name: Logout from Azure
        if: always()
        run: |
          az logout
